name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check (svelte-check)
        run: npm run check

      - name: Unit tests (vitest)
        run: npm test

      - name: Production audit (high+ severity)
        # Fail on high or critical advisories in production deps only.
        # Dev deps and informational findings do not block CI.
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: false
